spring:
  application:
    name: api-gateway
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}

server:
  port: ${SERVER_PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always

logging:
  level:
    root: ${LOG_LEVEL:INFO}
    com.orderflow: DEBUG

---
spring:
  config:
    activate:
      on-profile: docker
  cloud:
    gateway:
      default-filters:
        - name: RequestRateLimiter
          args:
            redis-rate-limiter:
              replenishRate: 100
              burstCapacity: 100
            key-resolver: "#{@userKeyResolver}"
        - name: CircuitBreaker
          args:
            name: orderflow-circuit-breaker

server:
  port: 8080

logging:
  level:
    root: INFO
    com.orderflow: DEBUG
